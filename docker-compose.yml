version: '3.8'

services:
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    ports:
      - "80:80"
    depends_on:
      - backend

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    ports:
      - "5000:5000"
    environment:
      PORT: 5000
      DB_HOST: db
      DB_USER: root
      DB_PASSWORD: YourStrongPassword123!
      DB_NAME: culinaria_store
      DB_PORT: 3306
      JWT_SECRET: cambia_este_secreto
    depends_on:
      - db
    volumes:
      - uploads_data:/usr/src/app/uploads

  db:
    image: mysql:8.0
    environment:
      MYSQL_ROOT_PASSWORD: YourStrongPassword123!
      MYSQL_DATABASE: culinaria_store
    ports:
      - "3306:3306"
    volumes:
      - db_data:/var/lib/mysql
      - ./docs/database/culinaria_store.sql:/docker-entrypoint-initdb.d/init.sql

volumes:
  db_data:
  uploads_data:
